<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 604" width="880" height="604" role="img" aria-label="pdfsigner architecture: R interface calls the extendr bridge, which links the pure-Rust pdf_signer crate and its vendored dependencies, producing PAdES-signed PDFs and verification reports.">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <g font-family="ui-sans-serif, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">

    <!-- arrows (drawn first, behind bands' gaps) -->
    <g stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)">
      <line x1="440" y1="100" x2="440" y2="125"/>
      <line x1="440" y1="204" x2="440" y2="229"/>
      <line x1="440" y1="360" x2="440" y2="385"/>
      <line x1="440" y1="482" x2="440" y2="505"/>
    </g>

    <!-- Band 1: R interface -->
    <rect x="30" y="24" width="820" height="76" rx="14" fill="#E8F1FB" stroke="#276DC3" stroke-width="1.5"/>
    <text x="48" y="46" font-size="12" font-weight="700" letter-spacing="1.5" fill="#1A4E8A">R INTERFACE  ·  R/sign.R</text>
    <g font-size="13.5" fill="#1A4E8A" text-anchor="middle">
      <rect x="300" y="56" width="160" height="32" rx="8" fill="#ffffff" stroke="#276DC3"/>
      <text x="380" y="76">sign_pdf()</text>
      <rect x="478" y="56" width="252" height="32" rx="8" fill="#ffffff" stroke="#276DC3"/>
      <text x="604" y="76">verify_pdf_signature()</text>
    </g>

    <rect x="452" y="103" width="124" height="22" rx="11" fill="#ffffff" stroke="#94a3b8"/>
    <text x="514" y="118" font-size="11.5" fill="#475569" text-anchor="middle">extendr (FFI)</text>

    <!-- Band 2: extendr bridge -->
    <rect x="30" y="128" width="820" height="76" rx="14" fill="#FCEEE3" stroke="#CE934B" stroke-width="1.5"/>
    <text x="48" y="150" font-size="12" font-weight="700" letter-spacing="1.5" fill="#8A5A2B">EXTENDR BRIDGE  ·  src/rust</text>
    <g font-size="13" fill="#8A5A2B" text-anchor="middle">
      <rect x="248" y="160" width="266" height="32" rx="8" fill="#ffffff" stroke="#CE934B"/>
      <text x="381" y="180">rust_sign_pdf / rust_verify_pdf</text>
      <rect x="540" y="160" width="212" height="32" rx="8" fill="#ffffff" stroke="#CE934B"/>
      <text x="646" y="180">libpdfsigner.a (staticlib)</text>
    </g>

    <!-- Band 3: pdf_signer crate -->
    <rect x="30" y="232" width="820" height="128" rx="14" fill="#E9F7EF" stroke="#2E9E5B" stroke-width="1.5"/>
    <text x="48" y="254" font-size="12" font-weight="700" letter-spacing="1.5" fill="#1C6B3C">PDF_SIGNER CRATE  ·  src/rust/pdf_signer  ·  100% pure Rust</text>
    <g font-size="12" fill="#1C6B3C" text-anchor="middle">
      <!-- row 1 -->
      <rect x="42"  y="266" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="114" y="288">sign</text>
      <rect x="200" y="266" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="272" y="288">verify</text>
      <rect x="358" y="266" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="430" y="288">trust · RFC 5280</text>
      <rect x="516" y="266" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="588" y="288">policy · PKITS</text>
      <rect x="674" y="266" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="746" y="288">crypto · CMS</text>
      <!-- row 2 -->
      <rect x="134" y="310" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="206" y="332">dss · LTV</text>
      <rect x="290" y="310" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="362" y="332">tsa · RFC 3161</text>
      <rect x="446" y="310" width="156" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="524" y="332">appearance · font/logo</text>
      <rect x="614" y="310" width="144" height="34" rx="8" fill="#ffffff" stroke="#2E9E5B"/><text x="686" y="332">incremental · xref</text>
    </g>

    <!-- Band 4: dependencies -->
    <rect x="30" y="388" width="820" height="94" rx="14" fill="#F0F0F4" stroke="#8888A0" stroke-width="1.5"/>
    <text x="48" y="410" font-size="12" font-weight="700" letter-spacing="1.5" fill="#44445A">RUST DEPENDENCIES  ·  vendored for offline build</text>
    <g font-size="11.5" fill="#44445A" text-anchor="middle">
      <!-- row 1 -->
      <rect x="42"  y="420" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="134" y="437">lopdf</text>
      <rect x="240" y="420" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="332" y="437">cms · x509-cert</text>
      <rect x="438" y="420" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="530" y="437">rsa · p256 · p384 · ed25519</text>
      <rect x="636" y="420" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="728" y="437">p12-keystore</text>
      <!-- row 2 -->
      <rect x="42"  y="450" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="134" y="467">x509-ocsp</text>
      <rect x="240" y="450" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="332" y="467">ttf-parser · png</text>
      <rect x="438" y="450" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="530" y="467">ureq · rustls (https)</text>
      <rect x="636" y="450" width="184" height="26" rx="7" fill="#ffffff" stroke="#8888A0"/><text x="728" y="467">flate2 · sha2</text>
    </g>

    <!-- Outputs -->
    <g font-size="12.5" text-anchor="middle">
      <rect x="120" y="514" width="300" height="34" rx="9" fill="#FFF6E5" stroke="#E0A93B" stroke-width="1.5"/>
      <text x="270" y="536" fill="#8A6516" font-weight="600">Signed PDF — PAdES B-B → B-LTA</text>
      <rect x="460" y="514" width="300" height="34" rx="9" fill="#FFF6E5" stroke="#E0A93B" stroke-width="1.5"/>
      <text x="610" y="536" fill="#8A6516" font-weight="600">Verification report</text>
    </g>

    <!-- Footer badge -->
    <rect x="180" y="566" width="520" height="26" rx="13" fill="#1C6B3C"/>
    <text x="440" y="583" font-size="11.5" fill="#ffffff" text-anchor="middle" font-weight="600">100% pure Rust — no Java · no OpenSSL · no system C libraries</text>

  </g>
</svg>
