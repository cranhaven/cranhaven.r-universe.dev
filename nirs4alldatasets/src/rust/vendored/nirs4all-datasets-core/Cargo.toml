# SPDX-License-Identifier: MIT
[package]
name = "nirs4all-datasets-core"
description = "Resolve + version-pinned download + SHA-256 verify + cache core for the nirs4all-datasets reference bank (Dataverse / Zenodo / figshare / URL). Pure acquisition + integrity; no scientific stack."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[features]
default = ["net"]
# `net` is the full native build: filesystem cache + the blocking ureq HTTP client
# (rustls; no system OpenSSL) + downloading/verify. Build with `--no-default-features`
# for targets without std networking/fs (wasm32-unknown-unknown), which keep only the
# pure resolve/model/hash surface and supply their own transport.
net = ["dep:ureq", "dep:directories"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
directories = { workspace = true, optional = true }
ureq = { workspace = true, optional = true }

